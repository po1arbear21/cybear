! 250nm Gate-Length MOSFET

[geometry]
  curr_fact = 1.0 : um

[semiconductor]
  electrons = true
  holes     = true
  N_c0      = 6.24672e15       : 1/cm^3
  N_v0      = 3.5e15           : 1/cm^3
  E_gap     = 1.12451923076923 : eV
  dos       = "parabolic"
  dist      = "maxwell"
  tabledir  = "tables/"
  reg       = false
  stab      = "SG"

[bulk mobility]
  zero_field_model = "Caughey-Thomas"
  alpha            = 0.77,   0.70
  mob_min          = 74.5,   122.3  : cm^2/V/s
  mob_max          = 1430.0, 480.0  : cm^2/V/s
  N_ref            = 8.6e16, 1.4e17 : 1/cm^3
  saturation_model = "off"
  beta             = 2.0,    1.0
  v_sat            = 1e7,    0.9e7  : cm/s

[grid]
  gtype = "tr_xy"
  max_area = 10 : nm^2

! Oxide
[poisson]
  x   =   -8,    0,   0,  -8,   -8,   -3,  -3,  -8 : nm
  y   = -145, -145, 145, 145, -125, -125, 125, 125 : nm
  eps = 3.9 : eps0

! Silicon
[poisson]
  x   =    0,  300, 300,   0 : nm
  y   = -215, -215, 215, 215 : nm
  eps = 11.7 : eps0
[transport]
  x   =    0,  300, 300,   0 : nm
  y   = -215, -215, 215, 215 : nm

[contact]
  name = "SRC"
  type = "ohmic"
  x    =    0,    0,   -8 : nm
  y    = -215, -145, -145 : nm
[contact]
  name = "DRN"
  type = "ohmic"
  x    =   0,   0,  -8 : nm
  y    = 145, 215, 215 : nm
[contact]
  name  = "GAT"
  type  = "gate"
  x     =   -8,   -3,  -3,  -8 : nm
  y     = -125, -125, 125, 125 : nm
  phims = 0.45
[contact]
  name = "BLK"
  type = "ohmic"
  x    =  300, 300 : nm
  y    = -215, 215 : nm
