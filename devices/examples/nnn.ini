$py(
Ldev = 500
Wdev = 300
Lchan = 500
Lgate = 560
Lsrc = 50
Ldrn = 50
tox = 10
tsi = 200
tblk = 180
tdop = 50

dcon  = 1e18
dcon_ct  = 2e19
epssi = 11.7
epsox = 3.76
phims = 0.715

dx_coarse = 4
dy_coarse = 4
dx_fine = 1
dy_fine = 1
)

[transport parameters]
  electrons  = true
  holes      = false
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12451923076923 : eV
  dos        = "parabolic"
  dist       = "fermi_reg"
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0 : cm
  incomp_ion = true
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3
  ii_tun     = false
  ii_tau_tun = 15.0, 15.0 : fs
  ii_m_tun   = 0.16, 0.16
  ii_pf      = false
  ii_pf_a    = 1.0 : meV
  ii_ef_min  = 1e-2 : V/m

[grid]
  gtype  = "x"
  max_dx = $(dx_fine) : nm

! Silicon
[poisson]
  x = $(-Ldev/2), $(Ldev/2) : nm
  eps = $(epssi) : eps0
[transport]
  x = $(-Ldev/2), $(Ldev/2) : nm
[doping]
  x    = $(-Ldev/2), $(-Ldev/2+Ldev/5) : nm
  dcon = $(dcon_ct) : 1/cm^3
[doping]
  x    = $(-Ldev/2+Ldev/5), $(Ldev/2-Ldev/5) : nm
  dcon = $(dcon) : 1/cm^3
[doping]
  x    = $(Ldev/2-Ldev/5), $(Ldev/2) : nm
  dcon = $(dcon_ct) : 1/cm^3

! Contacts
[contact]
  name = "SRC"
  type = "ohmic"
  x    = $(-Ldev/2), $(-Ldev/2) : nm
[contact]
  name = "DRN"
  type = "ohmic"
  x    = $(Ldev/2), $(Ldev/2)  : nm