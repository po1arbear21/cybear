$py(
Ldev = 600
Lhigh = 100

dcon      = 1e15
dcon_high = 1e17
epssi     = 11.7

dx = 1
)

[geometry]
  curr_fact = 1e-14 : m^2

[semiconductor]
  electrons = true
  holes     = false
  N_c0      = 6.24672e15       : 1/cm^3
  N_v0      = 3.5e15           : 1/cm^3
  E_gap     = 1.12451923076923 : eV
  dos       = "parabolic"
  dist      = "fermi"
  tabledir  = "tables/"
  reg       = true
  reg_A     = 1e-12
  reg_B     = 0.001
  stab      = "EXACT"

[bulk mobility]
  zero_field_model = "Caughey-Thomas"
  alpha            = 0.77,   0.70
  mob_min          = 74.5,   122.3  : cm^2/V/s
  mob_max          = 1430.0, 480.0  : cm^2/V/s
  N_ref            = 8.6e16, 1.4e17 : 1/cm^3
  saturation_model = "off"
  beta             = 2.0,    1.0
  v_sat            = 1e10,   1e10   : cm/s

[grid]
  gtype  = "x"
  max_dx = $(dx) : nm

! Silicon
[poisson]
  x = 0, $(Ldev) : nm
  eps = $(epssi) : eps0
[transport]
  x = 0, $(Ldev) : nm
[doping]
  x    = 0, $(Lhigh) : nm
  dcon = $(dcon_high) : 1/cm^3
[doping]
  x    = $(Lhigh), $(Ldev-Lhigh) : nm
  dcon = $(dcon) : 1/cm^3
[doping]
  x    = $(Ldev-Lhigh), $(Ldev) : nm
  dcon = $(dcon_high) : 1/cm^3

! Contacts
[contact]
  name = "L"
  type = "ohmic"
  x    = 0, 0 : nm
[contact]
  name = "R"
  type = "ohmic"
  x    = $(Ldev), $(Ldev)  : nm
