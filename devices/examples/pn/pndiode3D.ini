$py(
Ldev = 400
Wdev = 100
Hdev = 100

dcon  = 1e17
acon  = 1e17
epssi = 11.7

dx = 1
dy = 20
dz = 20
)

[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12451923076923 : eV
  dos        = "parabolic"
  dist       = "fermi"
  tabledir   = "tables/"
  reg        = true
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3
  ii_tun     = false
  ii_tau_tun = 15.0, 15.0 : fs
  ii_m_tun   = 0.16, 0.16
  ii_pf      = false
  ii_pf_a    = 1.0 : meV
  ii_ef_min  = 1e-2 : V/m
  stab       = "EXACT"

[grid]
  gtype  = "xyz"
  max_dx = $(dx) : nm
  max_dy = $(dy) : nm
  max_dz = $(dz) : nm

! Silicon
[poisson]
  x = 0, $(Ldev) : nm
  y = 0, $(Wdev) : nm
  z = 0, $(Hdev) : nm
  eps = $(epssi) : eps0
[transport]
  x = 0, $(Ldev) : nm
  y = 0, $(Wdev) : nm
  z = 0, $(Hdev) : nm

[doping]
  x    = 0, $(Ldev/2)  : nm
  y    = $(0), $(Wdev) : nm
  z    = 0, $(Hdev)    : nm
  acon = $(acon)       : 1/cm^3
[doping]
  x    = $(Ldev/2), $(Ldev) : nm
  y    = $(0), $(Wdev)      : nm
  z    = 0, $(Hdev)         : nm
  dcon = $(dcon)            : 1/cm^3

! Contacts
[contact]
  name = "L"
  type = "realohmic"
  x    = 0, 0          : nm
  y    = $(0), $(Wdev) : nm
  z    = 0, $(Hdev)    : nm
  vrec = 5e13          : nm/s
[contact]
  name = "R"
  type = "realohmic"
  x    = $(Ldev), $(Ldev) : nm
  y    = $(0), $(Wdev)    : nm
  z    = 0, $(Hdev)       : nm
  vrec = 5e13             : nm/s
