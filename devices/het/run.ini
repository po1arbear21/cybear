! Minimal run configuration for the Si/SiGe heterojunction equilibrium test.
! Both contacts held at V = 0 V; we expect J ≈ 0.

[nlpe params]
  log    = true
  atol   = 1e-10 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 20000

  solver           = "pardiso"
  pardiso.nthreads = 1

[dd params]
  log              = true
  atol             = 1e-10 : cm^-3
  rtol             = 1e-10
  dx_lim           = 5e16  : cm^-3
  min_it           = 2
  max_it           = 100
  ndens.dx_lim_rel = 0.8

  solver                                = "mumps"
  mumps.ICNTL16_openmp_threads          = 1
  mumps.ICNTL14_memory_increase_percent = 150

[gummel params]
  log    = true
  atol   = 1e-3 : V
  min_it = 1
  max_it = 200

[full newton params]
  log              = true
  msg              = "Newton: "
  atol             = 1e-12 : V
  rtol             = 1e-10
  dx_lim           = 0.1   : V
  min_it           = 2
  max_it           = 150
  currents.atol    = 1e-10 : A
  currents.dx_lim  = 1e300
  ndens.atol       = 1e9   : cm^-3
  ndens.dx_lim_rel = 0.2

  solver                                = "mumps"
  mumps.ICNTL16_openmp_threads          = 1
  mumps.ICNTL14_memory_increase_percent = 150

[small signal params]
  log              = true
  solver           = "pardiso"
  pardiso.nthreads = 1

[transient params]
  log              = true
  method           = "TRBDF2"
  adaptive         = true
  eabs             = 0.01
  atol             = 1e-12 : V
  rtol             = 1e-10
  dx_lim           = 0.1 : V
  min_it           = 2
  max_it           = 150

  solver                                = "mumps"
  mumps.ICNTL16_openmp_threads          = 1
  mumps.ICNTL14_memory_increase_percent = 150

[steady state]
  name = "EQ"
  V_L  = 0.0 : V
  V_R  = 0.0 : V
  N_L  = 1
  N_R  = 1
