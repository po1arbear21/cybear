! Si / Si0.8Ge0.2 / Si heterojunction at equilibrium.
!
! N-type Si on both ends with a 100 nm strained Si0.8Ge0.2 barrier in the middle.
! Both ohmic contacts sit on the Si (mat_default = Si), so the contact code can
! continue using smc_default while the interior heterojunction physics runs
! through band_edge_v / edos_v.
!
! Ec_offset declares the CB-edge offset on a user-chosen reference scale; the
! simulator only ever consumes differences (dEc(mat1) - dEc(mat2)). Here Si is
! the reference (Ec_offset = 0); SiGe20 sits 20 meV above Si in the CB, forming
! a thin barrier for electrons.

$py(
LSi_L   = 100    # left  Si region (nm)
LSiGe   = 100    # SiGe barrier (nm)
LSi_R   = 100    # right Si region (nm)
Ltot    = LSi_L + LSiGe + LSi_R
xR1     = LSi_L
xR2     = LSi_L + LSiGe

dcon    = 1e17   # uniform n-type doping (cm^-3)

dx      = 1.0    # grid spacing (nm)
)

[geometry]
  curr_fact = 1.0 : um^2

! ---------- material catalog ----------
[semiconductor]
  name      = "Si"
  electrons = true
  holes     = false
  N_c0      = 6.24672e15        : 1/cm^3   ! 2.86e19 / T^1.5 at T=300 K (matches existing convention)
  N_v0      = 3.5e15            : 1/cm^3
  E_gap     = 1.12451923076923  : eV
  Ec_offset = 0.0               : eV       ! reference material
  dos       = "parabolic"
  dist      = "maxwell"
  tabledir  = "tables/"
  reg       = false
  stab      = "SG"

[semiconductor]
  name      = "SiGe20"
  electrons = true
  holes     = false
  N_c0      = 5.45e15           : 1/cm^3   ! ~12% smaller than Si (effective mass slightly lower)
  N_v0      = 3.0e15            : 1/cm^3
  E_gap     = 1.06              : eV       ! ~65 meV narrower than Si (strained Si0.8Ge0.2)
  Ec_offset = 0.020             : eV       ! SiGe CB sits 20 meV above Si CB (small barrier)
  dos       = "parabolic"
  dist      = "maxwell"
  reg       = false
  stab      = "SG"

[bulk mobility]
  zero_field_model = "Caughey-Thomas"
  alpha            = 0.77,   0.70
  mob_min          = 74.5,   122.3  : cm^2/V/s
  mob_max          = 1430.0, 480.0  : cm^2/V/s
  N_ref            = 8.6e16, 1.4e17 : 1/cm^3
  saturation_model = "off"

[grid]
  gtype  = "x"
  max_dx = $(dx) : nm

! ---------- regions ----------
[poisson]
  x   = 0.0, $(Ltot) : nm
  eps = 11.7         : eps0

! Si on the left
[transport]
  x        = 0.0, $(xR1) : nm
  material = "Si"
! SiGe barrier in the middle
[transport]
  x        = $(xR1), $(xR2) : nm
  material = "SiGe20"
! Si on the right
[transport]
  x        = $(xR2), $(Ltot) : nm
  material = "Si"

[doping]
  x    = 0.0, $(Ltot) : nm
  dcon = $(dcon)       : 1/cm^3

! ---------- contacts (both on Si) ----------
[contact]
  name = "L"
  type = "ohmic"
  x    = 0, 0   : nm
[contact]
  name = "R"
  type = "ohmic"
  x    = $(Ltot), $(Ltot)  : nm
