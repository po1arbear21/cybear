! p-n junction

[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3 ! 4.82e15 * 6 * 0.36**1.5
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12451923076923 : eV
  tabledir   = "tables/"
  stab       = "SG"
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    = 100, 100 : cm^2/V/s
  mob_max    = 100, 100 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0 : um^2

  ! incomplete ionization (disabled)
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3

[grid]
  gtype = "x"
  max_dx = 1 : nm

[poisson]
  x   = 0, 1 : um
  eps = 11.7 : eps0

[transport]
  x = 0, 1 : um

[doping]
  x = 0, 0.5 : um
  acon = 3e17 : 1/cm^3
[doping]
  x = 0.5, 1.0 : um
  dcon = 1e17 : 1/cm^3

[contact]
  name = "SRC"
  type = "ohmic"
  x = 1, 1 : um

[contact]
  name = "DRN"
  type = "ohmic"
  x = 0, 0 : um
