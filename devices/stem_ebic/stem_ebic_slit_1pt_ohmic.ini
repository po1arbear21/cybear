! STEM-EBIC Device Configuration — FIB Slit Geometry (SINGLE-POINT BEAM, OHMIC + INTERLAYERS)
!
! Variant of stem_ebic_slit_1pt.ini where the two Schottky contacts are
! replaced by four ohmic contacts (each edge split at the p-n junction),
! with doped interlayers that mimic the Schottky depletion region.
!
!   Contact layout (each edge):
!     y=[7.0, 8.5] µm  → OHMIC on p-region   — preceded by n⁺ interlayer (1e19)
!     y=[0.0, 7.0] µm  → OHMIC on n-region   — preceded by p⁺ interlayer (1e17)
!
!   Design target (matching Schottky φ_b=0.42 eV, bulk=1e16):
!     n-side: V_bi ≈ 0.17 V → W ≈ 165 nm (Schottky ref: 150 nm)
!     p-side: V_bi ≈ 0.40 V → W ≈ 230 nm (Schottky ref: 250 nm)
!
!   Interlayer thickness: 50 nm (negligible depletion on heavily-doped side)

! Left slit void:  x=[0.5, 1.0], y=[1.5, 9.0] (cuts Si + SiO₂)
! Right slit void: x=[13.0, 13.5], y=[0, 8.0] (cuts Si only)

$py(
# Device geometry (um)
width     = 14.0
si_height = 8.5
ox_height = 9.0
junction  = 7.0

# Left slit (void)
lslit_x0  = 0.5
lslit_x1  = 1.0
lslit_y0  = 1.5

# Right slit (void)
rslit_x0  = 13.0
rslit_x1  = 13.5
rslit_y1  = 8.0

# Interlayer thickness (um)
il_t      = 0.05   # 50 nm

# Contact gap at junction (um): each contact ends/starts this far from y=junction
# so the two contacts on each edge don't share the junction node
gap       = 0.01   # 10 nm
)


[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12       : eV
  dos        = "parabolic"
  dist       = "maxwell"
  tabledir   = "tables/"
  stab       = "SG"
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0 : um
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3

  srh        = true
  srh_tau_n  = 2e-11 : s
  srh_tau_p  = 2e-11 : s

  surf_recom = false

[grid]
  gtype  = "xy"
  max_dx = 100.0 : nm
  max_dy = 100.0 : nm

! ── Poisson regions (ORDER MATTERS: later overwrites earlier) ──

! 1. Silicon base
[poisson]
  x   = 0.0, $(width) : um
  y   = 0.0, $(si_height) : um
  eps = 11.7 : eps0

! 2. SiO2 oxide on top
[poisson]
  x   = 0.0, $(width) : um
  y   = $(si_height), $(ox_height) : um
  eps = 3.9 : eps0

! 3. Left slit void
[poisson]
  x   = $(lslit_x0), $(lslit_x1) : um
  y   = $(lslit_y0), $(ox_height) : um
  eps = 1.0 : eps0

! 4. Right slit void
[poisson]
  x   = $(rslit_x0), $(rslit_x1) : um
  y   = 0.0, $(rslit_y1) : um
  eps = 1.0 : eps0

! ── Transport regions (5 strips covering Si \ slits) ──

[transport]
  x = 0.0, $(lslit_x0) : um
  y = 0.0, $(si_height) : um

[transport]
  x = $(lslit_x0), $(lslit_x1) : um
  y = 0.0, $(lslit_y0) : um

[transport]
  x = $(lslit_x1), $(rslit_x0) : um
  y = 0.0, $(si_height) : um

[transport]
  x = $(rslit_x0), $(rslit_x1) : um
  y = $(rslit_y1), $(si_height) : um

[transport]
  x = $(rslit_x1), $(width) : um
  y = 0.0, $(si_height) : um

! ── Bulk doping ──

! p-type (above junction)
[doping]
  x    = 0.0, $(width) : um
  y    = $(junction), $(si_height) : um
  acon = 1e16 : 1/cm^3

! n-type (below junction)
[doping]
  x    = 0.0, $(width) : um
  y    = 0.0, $(junction) : um
  dcon = 1e16 : 1/cm^3

! ── Interlayer doping (opposite-polarity to mimic Schottky depletion) ──

! Left edge, n-region half: p⁺ interlayer (1e17 acceptors)
[doping]
  x    = 0.0, $(il_t) : um
  y    = 0.0, $(junction) : um
  acon = 1e17 : 1/cm^3

! Left edge, p-region half: n⁺ interlayer (1e19 donors)
[doping]
  x    = 0.0, $(il_t) : um
  y    = $(junction), $(si_height) : um
  dcon = 1e19 : 1/cm^3

! Right edge, n-region half: p⁺ interlayer (1e17 acceptors)
[doping]
  x    = $(width - il_t), $(width) : um
  y    = 0.0, $(junction) : um
  acon = 1e17 : 1/cm^3

! Right edge, p-region half: n⁺ interlayer (1e19 donors)
[doping]
  x    = $(width - il_t), $(width) : um
  y    = $(junction), $(si_height) : um
  dcon = 1e19 : 1/cm^3

! ── Contacts (4 ohmic, split at junction y=7.0 µm) ──

! Left edge, n-region (matches p⁺ interlayer)
[contact]
  name = "LEFT_N"
  type = "ohmic"
  x    = 0.0, 0.0 : um
  y    = 0.0, $(junction - gap) : um

! Left edge, p-region (matches n⁺ interlayer)
[contact]
  name = "LEFT_P"
  type = "ohmic"
  x    = 0.0, 0.0 : um
  y    = $(junction + gap), $(si_height) : um

! Right edge, n-region (matches p⁺ interlayer)
[contact]
  name = "RIGHT_N"
  type = "ohmic"
  x    = $(width), $(width) : um
  y    = 0.0, $(junction - gap) : um

! Right edge, p-region (matches n⁺ interlayer)
[contact]
  name = "RIGHT_P"
  type = "ohmic"
  x    = $(width), $(width) : um
  y    = $(junction + gap), $(si_height) : um

! ── STEM-EBIC beam (single point at junction, zero current for equilibrium test) ──

[beam]
  beam_min  = 0.0 : um
  beam_max  = $(si_height) : um
  beam_x    = 0.25 : um
  I_beam    = 0.0825 : nA/um
  lamella_t = 500.0 : nm
  beam_dist = "point"
  Y_BEAM    = $(junction) : um

! ── SRH lifetime overrides ──

[srh]
  x         = 0.0, $(lslit_x0) : um
  y         = 0.0, $(si_height) : um
  srh_tau_n = 5e-11 : s
  srh_tau_p = 5e-11 : s

[srh]
  x         = $(rslit_x1), $(width) : um
  y         = 0.0, $(si_height) : um
  srh_tau_n = 5e-11 : s
  srh_tau_p = 5e-11 : s

! ── Grid refinement ──

! Junction (y = 7.0 um) — split at contact-gap boundaries (y=junction±gap)
[refine grid]
  y  = 6.5, $(junction - gap) : um
  dy = 20.0, 2.0 : nm
  e  = 1.0

[refine grid]
  y  = $(junction - gap), $(junction) : um
  dy = 2.0, 2.0 : nm
  e  = 1.0

[refine grid]
  y  = $(junction), $(junction + gap) : um
  dy = 2.0, 2.0 : nm
  e  = 1.0

[refine grid]
  y  = $(junction + gap), 7.5 : um
  dy = 2.0, 20.0 : nm
  e  = 1.0

[refine grid]
  x  = 0.0, $(il_t) : um
  dx = 2.0, 5.0 : nm         ! inside interlayer
  e  = 1.0

[refine grid]
  x  = $(il_t), 0.5 : um
  dx = 5.0, 50.0 : nm        ! just outside interlayer, into bulk
  e  = 1.0

[refine grid]
  x  = 13.5, $(width - il_t) : um
  dx = 50.0, 5.0 : nm        ! bulk toward right interlayer
  e  = 1.0

[refine grid]
  x  = $(width - il_t), $(width) : um
  dx = 5.0, 2.0 : nm         ! inside right interlayer
  e  = 1.0

! Left slit y-boundary
[refine grid]
  y  = 1.0, 1.5 : um
  dy = 50.0, 10.0 : nm
  e  = 1.0

! Right slit y-boundary
[refine grid]
  y  = 7.5, 8.0 : um
  dy = 20.0, 10.0 : nm
  e  = 1.0
