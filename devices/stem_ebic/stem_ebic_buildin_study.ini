! STEM-EBIC Lateral Device — Built-in Field Study
!
!   Geometry (lateral p-n junction):
!   x=300nm ┌─────────────────────────────────────┐
!           │                                     │
!           │  p-region   │   n-region            │
!           │             │                       │
!   x=0     └─────────────────────────────────────┘
!           y=0         y=1.5μm                  y=8.5μm
!            ↑            ↑                        ↑
!         P_CONTACT    junction              N_CONTACT
!        (Schottky)                          (Schottky)

$py(
thickness = 300.0        # nm
length    = 8500.0       # nm
junction  = 1500.0       # nm
)


[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12       : eV
  dos        = "parabolic"
  dist       = "maxwell"
  tabledir   = "tables/"
  stab       = "SG"
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0 : um
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3

  srh        = true
  srh_tau_n  = 5.9e-6 : s
  srh_tau_p  = 1.9e-6 : s

  surf_recom   = true
  S_surf       = 1e6  : cm/s

  charged_surf = false
  E_surf       = 0.0   : eV
  N_surf       = 1e11  : 1/cm^2


[grid]
  gtype  = "xy"
  max_dx = 5.0 : nm
  max_dy = 100.0 : nm

[poisson]
  x   = 0.0, $(thickness) : nm
  y   = 0.0, $(length) : nm
  eps = 11.7 : eps0

[transport]
  x = 0.0, $(thickness) : nm
  y = 0.0, $(length) : nm

! p-type doping (y = 0 to junction)
[doping]
  x    = 0.0, $(thickness) : nm
  y    = 0.0, $(junction) : nm
  acon = 1e17 : 1/cm^3

! n-type doping (y = junction to end)
[doping]
  x    = 0.0, $(thickness) : nm
  y    = $(junction), $(length) : nm
  dcon = 1e17 : 1/cm^3

! Schottky contact on p-side
[contact]
  name  = "P_CONTACT"
  type  = "schottky"
  x     = 0, $(thickness) : nm
  y     = 0, 0 : nm
  phi_b = 0.4 : eV
  A_richardson_n = 112.0 : A/cm^2/K^2
  A_richardson_p = 32.0  : A/cm^2/K^2

! Schottky contact on n-side
[contact]
  name  = "N_CONTACT"
  type  = "schottky"
  x     = 0, $(thickness) : nm
  y     = $(length), $(length) : nm
  phi_b = 0.4 : eV
  A_richardson_n = 112.0 : A/cm^2/K^2
  A_richardson_p = 32.0  : A/cm^2/K^2

! STEM-EBIC beam sweep along y
[beam]
  beam_min  = 0 : nm
  beam_max  = $(length) : nm
  I_beam    = 0.0825 : nA/um
  lamella_t = $(thickness) : nm
  beam_dist = "line"
  Y_BEAM    = 0, 500, 1200, 1800, 2500, 6000, 8000, 8500 : nm
  N_BEAM    = 6, 15, 15, 8, 4, 4, 6

! Dense near P_CONTACT (y=0)
[refine grid]
  y  = 0, 300 : nm
  dy = 5.0, 20.0 : nm
  e  = 1.0

! Dense near junction
[refine grid]
  y  = 1300, 1500 : nm
  dy = 20.0, 2.0 : nm
  e  = 1.0

[refine grid]
  y  = 1500, 1700 : nm
  dy = 2.0, 20.0 : nm
  e  = 1.0

! Dense near N_CONTACT (y=8500)
[refine grid]
  y  = 8200, 8500 : nm
  dy = 20.0, 5.0 : nm
  e  = 1.0
