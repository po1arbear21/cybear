! STEM-EBIC Slit Geometry — DEBUG: no voids, single transport region
! Same grid/doping/contacts as slit_ohmic but without void regions
! and with a single transport rectangle. For Jacobian debugging only.

$py(
# Device geometry (um)
width     = 14.0
si_height = 8.5
ox_height = 9.0
junction  = 7.0
)


[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12       : eV
  dos        = "parabolic"
  dist       = "maxwell"
  tabledir   = "tables/"
  stab       = "SG"
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0 : um
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3

  srh        = true           ! Enable SRH recombination
  srh_tau_n  = 1e-10 : s
  srh_tau_p  = 1e-10 : s


[grid]
  gtype  = "xy"
  max_dx = 100.0 : nm
  max_dy = 100.0 : nm

! ── Poisson: entire domain is Si (no voids) ──

[poisson]
  x   = 0.0, $(width) : um
  y   = 0.0, $(si_height) : um
  eps = 11.7 : eps0

[poisson]
  x   = 0.0, $(width) : um
  y   = $(si_height), $(ox_height) : um
  eps = 3.9 : eps0

! ── Single transport region (entire Si) ──

[transport]
  x = 0.0, $(width) : um
  y = 0.0, $(si_height) : um

! ── Doping ──

[doping]
  x    = 0.0, $(width) : um
  y    = $(junction), $(si_height) : um
  acon = 1e18 : 1/cm^3

[doping]
  x    = 0.0, $(width) : um
  y    = 0.0, $(junction) : um
  dcon = 1e18 : 1/cm^3

! ── Split ohmic contacts (same as slit_ohmic) ──

[contact]
  name = "LEFT_N"
  type = "ohmic"
  x    = 0.0, 0.0 : um
  y    = 0.0, 6.5 : um

[contact]
  name = "LEFT_P"
  type = "ohmic"
  x    = 0.0, 0.0 : um
  y    = 7.5, $(si_height) : um

[contact]
  name = "RIGHT_N"
  type = "ohmic"
  x    = $(width), $(width) : um
  y    = 0.0, 6.5 : um

[contact]
  name = "RIGHT_P"
  type = "ohmic"
  x    = $(width), $(width) : um
  y    = 7.5, $(si_height) : um

! ── STEM-EBIC beam sweep ──

[beam]
  beam_min  = 0.0 : um
  beam_max  = $(si_height) : um
  beam_x    = 7.0 : um
  I_beam    = 0.0825 : nA/um
  lamella_t = 500.0 : nm
  beam_dist = "point"
  Y_BEAM    = 0, 5.5, 8.0, 8.5 : um
  N_BEAM    = 11, 26, 6

! ── Same grid refinement as slit geometry ──

[refine grid]
  y  = 6.5, 7.0 : um
  dy = 20.0, 2.0 : nm
  e  = 1.0

[refine grid]
  y  = 7.0, 7.5 : um
  dy = 2.0, 20.0 : nm
  e  = 1.0

[refine grid]
  x  = 0.0, 0.5 : um
  dx = 5.0, 50.0 : nm
  e  = 1.0

[refine grid]
  x  = 13.5, 14.0 : um
  dx = 50.0, 5.0 : nm
  e  = 1.0

[refine grid]
  y  = 1.0, 1.5 : um
  dy = 50.0, 10.0 : nm
  e  = 1.0

[refine grid]
  y  = 7.5, 8.0 : um
  dy = 20.0, 10.0 : nm
  e  = 1.0
