! Linearity-test suite manifest
!
! Each [case] triggers one subprocess invocation of linearity_test with the
! specified --device and --run paths (relative to the run directory, which is
! where fargo stages all the INI files listed under this target's templates).

[case]
  name   = "lateral"
  device = "lateral.ini"
  run    = "run_linearity_lateral.ini"

[case]
  name   = "lateral_surf"
  device = "lateral_surf.ini"
  run    = "run_linearity_lateral_surf.ini"

[case]
  name   = "lateral_schottky"
  device = "lateral_schottky.ini"
  run    = "run_linearity_lateral_schottky.ini"

[case]
  name   = "flat_ohmic"
  device = "flat_ohmic.ini"
  run    = "run_linearity_flat_ohmic.ini"

[case]
  name   = "flat_schottky"
  device = "flat_schottky.ini"
  run    = "run_linearity_flat_schottky.ini"

[case]
  name   = "slit"
  device = "slit.ini"
  run    = "run_linearity_slit.ini"
