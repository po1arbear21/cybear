! Linearity Test run configuration — flat ohmic control (no slits, point beam)
!
! Device: devices/linearity_test/flat_ohmic.ini
!   - 14 × 8.5 μm top-view geometry (no FIB slits)
!   - Ohmic contacts at diagonal corners: P top-right, N bottom-left
!   - Junction at y = 7.0 μm (horizontal)
!   - Point beam at fixed (x=7, y=r_A); lamella_t = 500 nm

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-9 : V
  rtol   = 1e-9
  dx_lim = 0.1 : V
  min_it = 2
  max_it = 1000

[linearity test]
  name                 = "linearity_flat_ohmic"

  ! Test 1 — Homogeneity. Beam at junction (y = 7 μm), same as slit setup.
  r_A                  = 7000.0 : nm
  decade_multipliers   = -2.0, -1.0, 0.0, 1.0, 2.0
  I_exp                = 0.0825 : nA/um
  run_test_1           = true

  ! Test 2 — Superposition (not yet implemented)
  r_B                  = 5000.0 : nm              ! quasi-neutral n-side
  superposition_levels = 1.0, 10.0, 100.0
  run_test_2           = false

  ! Test 3 — Small-signal ratios (not yet implemented)
  run_test_3           = false
