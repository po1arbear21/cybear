! Linearity Test run configuration — FIB slit Schottky device
!
! Device: devices/linearity_test/slit.ini  (SRH on, surf off)
!   - 2D slit geometry (two FIB void regions), Schottky contacts both sides (phi_b = 0.42 eV)
!   - Junction at y = 7.0 μm, device height si_height = 8.5 μm, width = 14 μm
!   - SRH: tau_n = tau_p = 2e-11 s  (short lifetimes representative of defective FIB lamella)

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-9 : V
  rtol   = 1e-9
  dx_lim = 0.1 : V     ! critical for Schottky slit geometry
  min_it = 2
  max_it = 1000

[linearity test]
  name                 = "linearity_slit"

  ! Test 1 — Homogeneity. Beam at y = junction = 7 μm (depletion).
  r_A                  = 7000.0 : nm
  decade_multipliers   = -2.0, -1.0, 0.0, 1.0, 2.0
  I_exp                = 0.0825 : nA/um
  run_test_1           = true

  ! Test 2 — Superposition (not yet implemented)
  ! r_B: quasi-neutral n-side (n doping is below y = junction)
  r_B                  = 5000.0 : nm
  superposition_levels = 1.0, 10.0, 100.0
  run_test_2           = false

  ! Test 3 — Small-signal ratios (not yet implemented)
  run_test_3           = false
