! Linearity Test run configuration — lateral ohmic-contact + surface recombination
!
! Device: devices/linearity_test/lateral_surf.ini  (SRH on, surf ON)
!   - Same geometry as lateral, but surf_recom = true with S_surf = 1e6 cm/s.
!   - Probes whether surface recombination is the nonlinearity culprit.

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-9 : V
  rtol   = 1e-9
  dx_lim = 0.1 : V
  min_it = 2
  max_it = 1000

[linearity test]
  name                 = "linearity_lateral_surf"

  ! Test 1 — Homogeneity
  r_A                  = 2000.0 : nm              ! n-side, 0.5 μm from junction
  decade_multipliers   = -2.0, -1.0, 0.0, 1.0, 2.0
  I_exp                = 0.0825 : nA/um
  run_test_1           = false

  ! Test 2 — Superposition (not yet implemented)
  r_B                  = 3500.0 : nm
  superposition_levels = 1.0, 10.0, 100.0
  run_test_2           = false

  ! Test 3 — Small-signal ratios (not yet implemented)
  run_test_3           = false
