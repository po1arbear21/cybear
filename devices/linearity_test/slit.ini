! STEM-EBIC Device Configuration — FIB Slit Geometry
!
! Real FIB-prepared lamella with two partial slit cuts creating
! a thin membrane window for electron beam transmission.

! Left slit void:  x=[0.5, 1.0], y=[1.5, 9.0] (cuts Si + SiO₂)
! Right slit void: x=[13.0, 13.5], y=[0, 8.0] (cuts Si only)

$py(
# Device geometry (um)
width     = 14.0
si_height = 8.5
ox_height = 9.0
junction  = 7.0

# Left slit (void)
lslit_x0  = 0.5
lslit_x1  = 1.0
lslit_y0  = 1.5

# Right slit (void)
rslit_x0  = 13.0
rslit_x1  = 13.5
rslit_y1  = 8.0
)


[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12       : eV
  dos        = "parabolic"
  dist       = "maxwell"
  tabledir   = "tables/"
  stab       = "SG"
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0 : um
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3

  srh        = true           ! Enable SRH recombination
  !srh_tau_n  = 1e-10 : s      ! Electron lifetime
  !srh_tau_p  = 1e-10 : s      ! Hole lifetime
  srh_tau_n  = 2e-11 : s      ! Electron lifetime
  srh_tau_p  = 2e-11 : s      ! Hole lifetime

  surf_recom = false
  ! S_surf   = 1e6 : cm/s    ! No free surfaces in 2D slit cross-section (x-boundaries are contacts)

[grid]
  gtype  = "xy"
  max_dx = 100.0 : nm         ! Adjusted for larger device (14 um width)
  max_dy = 100.0 : nm         ! Adjusted for larger device (9 um height)

! ── Poisson regions (ORDER MATTERS: later overwrites earlier) ──

! 1. Silicon base
[poisson]
  x   = 0.0, $(width) : um
  y   = 0.0, $(si_height) : um
  eps = 11.7 : eps0

! 2. SiO2 oxide on top
[poisson]
  x   = 0.0, $(width) : um
  y   = $(si_height), $(ox_height) : um
  eps = 3.9 : eps0

! 3. Left slit void (overwrites Si + SiO2)
[poisson]
  x   = $(lslit_x0), $(lslit_x1) : um
  y   = $(lslit_y0), $(ox_height) : um
  eps = 1.0 : eps0

! 4. Right slit void (overwrites Si)
[poisson]
  x   = $(rslit_x0), $(rslit_x1) : um
  y   = 0.0, $(rslit_y1) : um
  eps = 1.0 : eps0

! ── Transport regions (5 strips covering Si \ slits) ──

! Strip 1: Left of left slit
[transport]
  x = 0.0, $(lslit_x0) : um
  y = 0.0, $(si_height) : um

! Strip 2: Below left slit
[transport]
  x = $(lslit_x0), $(lslit_x1) : um
  y = 0.0, $(lslit_y0) : um

! Strip 3: Center membrane (between slits)
[transport]
  x = $(lslit_x1), $(rslit_x0) : um
  y = 0.0, $(si_height) : um

! Strip 4: Above right slit (bridge)
[transport]
  x = $(rslit_x0), $(rslit_x1) : um
  y = $(rslit_y1), $(si_height) : um

! Strip 5: Right of right slit
[transport]
  x = $(rslit_x1), $(width) : um
  y = 0.0, $(si_height) : um

! ── Doping (full width — only applied to transport cells) ──

! p-type doping (above junction)
[doping]
  x    = 0.0, $(width) : um
  y    = $(junction), $(si_height) : um
  acon = 1e17 : 1/cm^3

! n-type doping (below junction)
[doping]
  x    = 0.0, $(width) : um
  y    = 0.0, $(junction) : um
  dcon = 1e17 : 1/cm^3

! ── Contacts (full Si edges) ──

! Schottky contact on left edge (full Si height, spans p+n)
[contact]
  name           = "N_CONTACT"
  type           = "schottky"
  phi_b          = 0.42  : eV
  A_richardson_n = 112.0 : A/cm^2/K^2
  A_richardson_p = 32.0  : A/cm^2/K^2
  x              = 0.0, 0.0 : um
  y              = 0.0, $(si_height) : um

! Schottky contact on right edge (full Si height, spans p+n)
[contact]
  name           = "P_CONTACT"
  type           = "schottky"
  phi_b          = 0.42 : eV
  A_richardson_n = 112.0 : A/cm^2/K^2
  A_richardson_p = 32.0  : A/cm^2/K^2
  x              = $(width), $(width) : um
  y              = 0.0, $(si_height) : um

! ── STEM-EBIC beam sweep ──

[beam]
  beam_min  = 0.0 : um          ! Sweep minimum (y)
  beam_max  = $(si_height) : um ! Sweep maximum (y, full Si depth)
  beam_x    = 7.0 : um          ! Fixed x position (center of device)
  I_beam    = 0.0825 : nA/um    ! Beam current per unit depth
  ! I_beam    = 0 : nA/um
  lamella_t = 500.0 : nm        ! Lamella thickness
  beam_dist = "point"           ! Point profile for top-view geometry
  Y_BEAM    = 0, 5.5, 8.0, 8.5 : um
  N_BEAM    = 11, 26, 6


! ── Grid refinement ──

! Junction refinement (y = 7.0 um)
[refine grid]
  y  = 6.5, 7.0 : um
  dy = 20.0, 2.0 : nm    ! coarse to fine approaching junction
  e  = 1.0

[refine grid]
  y  = 7.0, 7.5 : um
  dy = 2.0, 20.0 : nm    ! fine to coarse leaving junction
  e  = 1.0

! Contact refinement
[refine grid]
  x  = 0.0, 0.5 : um
  dx = 5.0, 50.0 : nm    ! fine near N_CONTACT
  e  = 1.0

[refine grid]
  x  = 13.5, 14.0 : um
  dx = 50.0, 5.0 : nm    ! fine near P_CONTACT
  e  = 1.0

! Left slit y-boundary refinement
[refine grid]
  y  = 1.0, 1.5 : um
  dy = 50.0, 10.0 : nm   ! refine approaching left slit bottom
  e  = 1.0

! Right slit y-boundary refinement
[refine grid]
  y  = 7.5, 8.0 : um
  dy = 20.0, 10.0 : nm   ! refine approaching right slit top
  e  = 1.0
