! Linearity Test run configuration — lateral ohmic-contact device
!
! Device: devices/linearity_test/lateral.ini  (SRH on, surf off)
!   - 2D lateral pn, ohmic contacts (P_CONTACT at y=0, N_CONTACT at y=5μm)
!   - Junction at y = 1.5 μm
!   - SRH: tau_n = 2e-11 s, tau_p = 5e-12 s
!   - I_beam default: 0.0825 nA/um

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-9 : V
  rtol   = 1e-9
  dx_lim = 0.1 : V     ! step-size cap; critical for Schottky, harmless for ohmic
  min_it = 2
  max_it = 1000

! Suite-level parameters for the linearity test driver
[linearity test]
  name                 = "linearity_lateral"

  ! Test 1 — Homogeneity
  r_A                  = 2000.0 : nm              ! n-side, 0.5 μm from junction
  decade_multipliers   = -2.0, -1.0, 0.0, 1.0, 2.0
  I_exp                = 0.0825 : nA/um           ! experimental beam current (matches device INI)
  run_test_1           = false

  ! Test 2 — Superposition (not yet implemented)
  r_B                  = 3500.0 : nm              ! quasi-neutral n-side, ~2μm from junction
  superposition_levels = 1.0, 10.0, 100.0
  run_test_2           = false

  ! Test 3 — Small-signal ratios (not yet implemented)
  run_test_3           = false
