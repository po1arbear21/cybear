! Minimal 1D Schottky diode for testing
! N-type Si with one Schottky contact and one ohmic contact

$py(
length = 1000.0   # nm (x-direction)
)

[geometry]
  curr_fact = 1.0 : um^2

[semiconductor]
  electrons = true
  holes     = false
  N_c0      = 6.24672e15       : 1/cm^3
  N_v0      = 3.5e15           : 1/cm^3
  E_gap     = 1.12451923076923 : eV
  dos       = "parabolic"
  dist      = "maxwell"
  tabledir  = "tables/"
  reg       = false
  stab      = "SG"

[bulk mobility]
  zero_field_model = "Caughey-Thomas"
  alpha            = 0.77,   0.70
  mob_min          = 74.5,   122.3  : cm^2/V/s
  mob_max          = 1430.0, 480.0  : cm^2/V/s
  N_ref            = 8.6e16, 1.4e17 : 1/cm^3
  saturation_model = "off"

[grid]
  gtype  = "x"
  max_dx = 10.0 : nm

[poisson]
  x   = 0.0, $(length) : nm
  eps = 11.7           : eps0

[transport]
  x = 0.0, $(length) : nm

[doping]
  x    = 0.0, $(length) : nm
  dcon = 1e16           : 1/cm^3

[contact]
  name           = "SCHOTTKY"
  type           = "schottky"
  phi_b          = 0.7   : eV
  A_richardson_n = 112.0 : A/cm^2/K^2
  A_richardson_p = 32.0  : A/cm^2/K^2
  x              = 0, 0  : nm

[contact]
  name = "OHMIC"
  type = "ohmic"
  x    = $(length), $(length) : nm
