! 3D STEM-EBIC device — adjoint validation target.
!
! Geometry: 500 nm (x) × 9 um (y) × 14 um (z). Si + 0.5 um SiO2 cap, pn
! junction at y = 7 um, ohmic contacts at diagonal corners. Line beam
! penetrating through x at (y_sweep, z_center). Beam z is hardcoded to the
! device center in beam_generation.f90:193-197 — adjoint sweep is 1D in y.
!
! Differences from devices/stem_ebic/stem_ebic_3D.ini:
!   - acon / dcon: 1e10 -> 1e17 (that device had sub-intrinsic doping — no
!     real pn junction; adjoint output would be uninformative).
!   - I_beam: 0 -> 0.0825 nA (adjoint driver saves & restores this; zero
!     beam current means zero I_EBIC everywhere).

$py(
thickness = 500.0
height    = 9.0
width     = 14.0
si_height = 8.5
junction  = 7.0

max_dx = 50.0
max_dy = 50.0
max_dz = 50.0
)

[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12       : eV
  dos        = "parabolic"
  dist       = "maxwell"
  tabledir   = "tables/"
  stab       = "SG"
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0               ! Dimensionless for 3D (no per-unit-depth scaling)
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3

  srh        = true
  srh_tau_n  = 2e-11 : s
  srh_tau_p  = 2e-11 : s

  surf_recom   = false
  charged_surf = false

[grid]
  gtype  = "xyz"
  max_dx = $(max_dx) : nm
  max_dy = $(max_dy) : nm
  max_dz = $(max_dz) : nm

! SiO2 oxide cap
[poisson]
  x   = 0.0, $(thickness) : nm
  y   = $(si_height), $(height) : um
  z   = 0.0, $(width) : um
  eps = 3.9 : eps0

! Silicon region
[poisson]
  x   = 0.0, $(thickness) : nm
  y   = 0.0, $(si_height) : um
  z   = 0.0, $(width) : um
  eps = 11.7 : eps0

! Transport region
[transport]
  x = 0.0, $(thickness) : nm
  y = 0.0, $(si_height) : um
  z = 0.0, $(width) : um

! p-type doping (above junction)
[doping]
  x    = 0.0, $(thickness) : nm
  y    = $(junction), $(si_height) : um
  z    = 0.0, $(width) : um
  acon = 1e17 : 1/cm^3

! n-type doping (below junction)
[doping]
  x    = 0.0, $(thickness) : nm
  y    = 0.0, $(junction) : um
  z    = 0.0, $(width) : um
  dcon = 1e17 : 1/cm^3

! Ohmic contact on p-side (top, z = 14 um corner)
[contact]
  name = "P_CONTACT"
  type = "ohmic"
  x    = 0.0, $(thickness) : nm
  y    = 8.0, $(si_height) : um
  z    = $(width), $(width) : um

! Ohmic contact on n-side (bottom, z = 0 corner)
[contact]
  name = "N_CONTACT"
  type = "ohmic"
  x    = 0.0, $(thickness) : nm
  y    = 0.0, 1.5 : um
  z    = 0.0, 0.0 : um

! Line beam penetrating through x at (y_sweep, z_center).
! Driver overrides beam_y per sweep step; beam_x/beam_z unused for line profile.
[beam]
  beam_min  = 0.0 : um
  beam_max  = $(si_height) : um
  I_beam    = 0.0825 : nA
  lamella_t = $(thickness) : nm
  beam_dist = "line"
  Y_BEAM    = $(junction) : um       ! Single anchor at the junction
