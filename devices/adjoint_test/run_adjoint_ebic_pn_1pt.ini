! Single-point fwd-vs-adjoint sanity check on pn_2d (2D line beam).
! Beam at y = 500 nm (junction center). Runs the same primal-check +
! Jacobian-linearization diagnostic as flat_ohmic_1pt, so we can tell
! whether the ~5e-4 fwd/adj shortfall and gauge-like |delta_u_fwd|
! blow-up are specific to the SiO2-capped flat_ohmic geometry or
! appear on plain-Si pn_2d too.

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-12 : V
  rtol   = 1e-12
  dx_lim = 0.1 : V
  min_it = 2
  max_it = 200

[adjoint ebic]
  name               = "pn_2d_1pt"
  collecting_contact = "N"

  ! Single beam position at the junction (y = 500 nm).
  ! Line beam -> x axis is unused (spans all x); just specify r_beam (y).
  r_beam_min = 500.0 : nm
  r_beam_max = 500.0 : nm
  r_beam_n   = 1

  ! Skip the built-in middle-r_beam forward spot-check; the linescan below
  ! covers the same single position with its numbers piped through the
  ! diagnostic blocks.
  run_forward_validation = false

  ! Route through build_adjoint_source + evaluate_ebic (dense phi . s) so
  ! the diagnostic output is comparable to flat_ohmic_1pt's slow-path run.
  use_fast_path = false

  ! Primal A . dU = s self-check + |dU_fwd| vs |A^-1 s| comparison.
  debug_primal_solve = true

  ! Forward-Newton reference at the same y.
  forward_linescan_n     = 1
  forward_linescan_y_min = 500.0 : nm
  forward_linescan_y_max = 500.0 : nm
