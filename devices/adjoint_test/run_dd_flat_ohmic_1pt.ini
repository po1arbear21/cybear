! Production dd-driver forward EBIC at (x=7, y=7) um on flat_ohmic_2d.
! Independent cross-check of our adjoint driver's run_forward_validation:
! if dd's I_N_CONTACT matches our forward-linescan I_EBIC to solver
! precision, the forward Newton in adjoint_ebic_driver is a faithful
! mirror of production. Any difference would mean the adj/fwd gap is
! partly our driver's own implementation, not purely a sys_full gauge.
!
! beam_x is set to 7.0 um in flat_ohmic_2d.ini's [beam] section.

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-12 : V
  rtol   = 1e-12
  dx_lim = 0.1 : V
  min_it = 2
  max_it = 200

[steady state]
  name        = "dd_flat_ohmic_1pt"
  V_P_CONTACT = 0.0 : V
  V_N_CONTACT = 0.0 : V
  ! Single beam position at (x=7 from device ini, y=7 um).
  Y_BEAM      = 7.0 : um
