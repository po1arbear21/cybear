! Single-point fwd-vs-adjoint sanity check at the junction center.
! Beam fixed at (x=7.0 um, y=7.0 um). One adjoint evaluation + one forward
! Newton solve. Purpose: isolate the ~2e-4 relative discrepancy seen on
! the dense flat_ohmic sweep so it can be re-run cheaply at scaled I_beam
! to test whether the error scales linearly with I_beam (linearization)
! or stays constant (bug).

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-12 : V
  rtol   = 1e-12
  dx_lim = 0.1 : V
  min_it = 2
  max_it = 200

[adjoint ebic]
  name               = "flat_ohmic_1pt"
  collecting_contact = "N_CONTACT"

  ! Single beam position — junction center.
  x_beam_min = 7.0 : um
  x_beam_max = 7.0 : um
  x_beam_n   = 1

  y_beam_min = 7.0 : um
  y_beam_max = 7.0 : um
  y_beam_n   = 1

  ! Skip the "middle r_beam" forward spot-check (it would duplicate the
  ! linescan point below).
  run_forward_validation = false

  ! Route through build_adjoint_source + evaluate_ebic (full dot-product over
  ! sys_full) instead of eval_I_EBIC_fast. Diagnostic: if fast-path I_EBIC
  ! differs from slow-path here, the bug is in the fast path.
  use_fast_path = false

  ! Primal-vs-adjoint self-consistency diagnostic: solve A·δu = s directly
  ! (no transpose), compare c·δu against phi·s. They must agree to solver
  ! precision if the transpose identity holds.
  debug_primal_solve = true

  ! Direct forward-Newton reference at the same (x, y).
  forward_linescan_n     = 1
  forward_linescan_x     = 7.0 : um
  forward_linescan_y_min = 7.0 : um
  forward_linescan_y_max = 7.0 : um
