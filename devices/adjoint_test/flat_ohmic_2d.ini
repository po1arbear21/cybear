! 2D flat ohmic device — adjoint EBIC validation target (2D sweep variant).
!
! Geometry mirrors devices/linearity_test/flat_ohmic.ini (14 x 8.5 um Si +
! 0.5 um SiO2, no slits, planar pn junction at y = 7 um). Point beam with
! (x, y) both swept by the adjoint driver. Ohmic contacts at diagonal
! corners keep the system linear for clean reciprocity validation.
!
! Differences from devices/linearity_test/flat_ohmic.ini:
!   - Sweep trajectory (Y_BEAM / X_BEAM / N_BEAM) trimmed; driver sets both
!     beam_x and beam_y directly per sweep step. Y_BEAM anchor points kept
!     to pin mesh nodes at device boundaries and the junction.

[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12       : eV
  dos        = "parabolic"
  dist       = "maxwell"
  tabledir   = "tables/"
  stab       = "SG"
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0 : um
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3

  srh        = true
  srh_tau_n  = 2e-11 : s
  srh_tau_p  = 2e-11 : s

[grid]
  gtype  = "xy"
  max_dx = 100.0 : nm
  max_dy = 100.0 : nm

! SiO2 oxide on top (0.5 um thick, y = 8.5-9.0 um)
[poisson]
  x   = 0.0, 14.0 : um
  y   = 8.5, 9.0 : um
  eps = 3.9 : eps0

! Silicon region (y = 0 to 8.5 um)
[poisson]
  x   = 0.0, 14.0 : um
  y   = 0.0, 8.5 : um
  eps = 11.7 : eps0

! Transport region (entire Si)
[transport]
  x = 0.0, 14.0 : um
  y = 0.0, 8.5 : um

! p-type doping above junction (1.5 um thick, y = 7.0 to 8.5 um)
[doping]
  x    = 0.0, 14.0 : um
  y    = 7.0, 8.5 : um
  acon = 1e17 : 1/cm^3

! n-type doping below junction
[doping]
  x    = 0.0, 14.0 : um
  y    = 0.0, 7.0 : um
  dcon = 1e17 : 1/cm^3

! Ohmic contact on p-side (right edge, top corner)
[contact]
  name = "P_CONTACT"
  type = "ohmic"
  x    = 14.0, 14.0 : um
  y    = 8.0, 8.5 : um

! Ohmic contact on n-side (left edge, bottom corner)
[contact]
  name = "N_CONTACT"
  type = "ohmic"
  x    = 0.0, 0.0 : um
  y    = 0.0, 1.5 : um

! Point beam. beam_x is the initial value; the adjoint driver overrides
! both beam_x and beam_y per sweep step.
[beam]
  beam_min  = 0.0 : um
  beam_max  = 8.5 : um
  beam_x    = 7.0 : um
  I_beam    = 0.0825 : nA/um
  lamella_t = 500.0 : nm
  beam_dist = "point"
  ! Single anchor at the pn junction; contacts already pin y=0 and y=8.5
  ! as grid nodes through the contact vertex machinery.
  Y_BEAM    = 7.0 : um

! Refine around the pn junction (y = 7.0 um)
[refine grid]
  y  = 6.5, 7.0 : um
  dy = 20.0, 2.0 : nm
  e  = 1.0

[refine grid]
  y  = 7.0, 7.5 : um
  dy = 2.0, 20.0 : nm
  e  = 1.0

! Refine near contacts for better current extraction
[refine grid]
  x  = 0.0, 0.5 : um
  dx = 5.0, 50.0 : nm
  e  = 1.0

[refine grid]
  x  = 13.5, 14.0 : um
  dx = 50.0, 5.0 : nm
  e  = 1.0
