! Adjoint EBIC run config for the 2D pn junction.
! Collecting contact: N on the n-side (y = L). Beam positions span both
! sides of the junction at y = 500 nm to exercise carrier separation.

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-12 : V
  rtol   = 1e-12
  dx_lim = 0.1 : V
  min_it = 2
  max_it = 200

[adjoint ebic]
  name               = "pn_2d_adjoint"
  collecting_contact = "N"
  ! Beam positions — two ways to specify:
  !   r_beam = v1, v2, ... : nm        (explicit list)
  !   r_beam_min / _max / _n           (uniform linspace, takes precedence)
  r_beam_min = 0.0   : nm
  r_beam_max = 1000.0 : nm
  r_beam_n   = 1001
