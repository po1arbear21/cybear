! Adjoint EBIC run config for the 3D pn device.
! Collecting contact: N_CONTACT. Line beam penetrates through x at (y, z);
! driver sweeps (y, z) Cartesian grid matching the flat_ohmic 2D run.
!
! Geometry mapping: flat_ohmic (x, y) = 3D (z, y)
!   flat_ohmic x: 0-14 um lateral -> 3D z: 0-14 um lateral
!   flat_ohmic y: 0-8.5 um depth  -> 3D y: 0-8.5 um depth

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e20  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-3 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 200

[full newton params]
  log             = true
  atol            = 1e-9 : V
  rtol            = 1e-9
  dx_lim          = 10   : V
  min_it          = 2
  max_it          = 100
  currents-dx_lim = 1e300

[adjoint ebic]
  name               = "stem_ebic_3d_adjoint"
  collecting_contact = "N_CONTACT"

  ! (y, z) Cartesian sweep: 15 * 20 = 300 beam positions, matching the
  ! flat_ohmic 2D run grid. Line beam penetrates full x-thickness at each
  ! (y, z) spot.
  y_beam_min = 0.0  : um
  y_beam_max = 8.5  : um
  y_beam_n   = 281

  z_beam_min = 0.0  : um
  z_beam_max = 14.0 : um
  z_beam_n   = 171
