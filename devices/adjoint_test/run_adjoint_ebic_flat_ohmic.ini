! Adjoint EBIC run config for the 2D flat-ohmic pn junction.
! Collecting contact: N_CONTACT (bottom-left corner, n-side).
!
! 2D beam sweep: Cartesian product of x_beam × y_beam positions. The adjoint
! driver evaluates I_EBIC(x, y) at every (x_i, y_j) pair, producing a 2D
! collection map on N_x × N_y positions.

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-12 : V
  rtol   = 1e-12
  dx_lim = 0.1 : V
  min_it = 2
  max_it = 200

[adjoint ebic]
  name               = "flat_ohmic_adjoint"
  collecting_contact = "N_CONTACT"
  ! 2D Cartesian sweep. Total sweep = x_beam_n * y_beam_n positions.
  ! Point beam profile (set in device ini) — driver updates both (x, y)
  ! at every sweep step before re-evaluating G(r; r_beam).
  x_beam_min = 0.0  : um
  x_beam_max = 14.0 : um
  x_beam_n   = 281

  y_beam_min = 0.0  : um
  y_beam_max = 8.5  : um
  y_beam_n   = 171

  ! Forward-Newton linescan reference at x = 7.5 um, 20 y-points.
  ! Compare fbs output fwd/I_EBIC(y) against adjoint/I_EBIC slice at x=7.5 um.
  forward_linescan_n     = 26
  forward_linescan_x     = 7.5 : um
  forward_linescan_y_min = 6.0 : um
  forward_linescan_y_max = 8.5 : um
