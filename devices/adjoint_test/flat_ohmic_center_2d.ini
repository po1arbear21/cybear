! 2D flat ohmic device — symmetric variant for operando adjoint EBIC.
!
! Same as flat_ohmic_2d.ini except the pn junction sits at y = 4.25 um
! (middle of the 0-8.5 um Si slab) instead of y = 7 um. Result: p and n
! regions are each 4.25 um thick, so forward bias drives a vertically-
! balanced injection pattern instead of the strongly-asymmetric pattern of
! the original (1.5 um p-region over 7 um n-region).
!
! Contacts remain at diagonal corners for direct comparison with the V=0
! reference, but the junction position is now geometry-centered.

[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12       : eV
  dos        = "parabolic"
  dist       = "maxwell"
  tabledir   = "tables/"
  stab       = "SG"
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0 : um
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3

  srh        = true
  srh_tau_n  = 2e-11 : s
  srh_tau_p  = 5e-12 : s

[grid]
  gtype  = "xy"
  max_dx = 50.0 : nm
  max_dy = 50.0 : nm

! SiO2 oxide on top (0.5 um thick, y = 8.5-9.0 um)
[poisson]
  x   = 0.0, 14.0 : um
  y   = 8.5, 9.0 : um
  eps = 3.9 : eps0

! Silicon region (y = 0 to 8.5 um)
[poisson]
  x   = 0.0, 14.0 : um
  y   = 0.0, 8.5 : um
  eps = 11.7 : eps0

! Transport region (entire Si)
[transport]
  x = 0.0, 14.0 : um
  y = 0.0, 8.5 : um

! p-type doping above centered junction (4.25 um thick, y = 4.25 to 8.5 um)
[doping]
  x    = 0.0, 14.0 : um
  y    = 4.25, 8.5 : um
  acon = 1e17 : 1/cm^3

! n-type doping below centered junction (4.25 um thick, y = 0 to 4.25 um)
[doping]
  x    = 0.0, 14.0 : um
  y    = 0.0, 4.25 : um
  dcon = 1e17 : 1/cm^3

! Symmetric corner contacts — 1.0 um tall each, matched to give a device
! that is 180-degree-rotation-symmetric about its center (7.0 um, 4.25 um).
! Under this symmetry, V=0 gives a perfectly mirror-symmetric collection
! map; any asymmetry under bias is a bias-polarity (not geometry) effect.
[contact]
  name = "P_CONTACT"
  type = "ohmic"
  x    = 14.0, 14.0 : um
  y    = 7.5, 8.5 : um

[contact]
  name = "N_CONTACT"
  type = "ohmic"
  x    = 0.0, 0.0 : um
  y    = 0.0, 1.0 : um

[beam]
  beam_min  = 0.0 : um
  beam_max  = 8.5 : um
  beam_x    = 7.0 : um
  I_beam    = 0.0825 : nA/um
  lamella_t = 500.0 : nm
  beam_dist = "point"
  Y_BEAM    = 4.25 : um
