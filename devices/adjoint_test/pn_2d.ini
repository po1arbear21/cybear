! 2D-extruded pn junction — adjoint EBIC validation target.
!
! Thin slab geometry (200 nm x 1 um) with a p-n junction at y = 0.5 um.
! Ohmic contacts at both y-edges, line beam sweeping across y. Effectively
! 1D along the y-axis. This configuration gives non-zero I_EBIC (carriers
! are separated by the junction field) so the forward-adjoint reciprocity
! test is non-degenerate.

[transport parameters]
  electrons  = true
  holes      = true
  N_c0       = 6.24672e15 : 1/cm^3
  N_v0       = 3.5e15     : 1/cm^3
  E_gap      = 1.12       : eV
  dos        = "parabolic"
  dist       = "maxwell"
  tabledir   = "tables/"
  stab       = "SG"
  reg_A      = 1e-12
  reg_B      = 0.001
  mob        = false
  alpha      =   0.77,   0.70
  beta       =    2.0,    1.0
  mob_min    =   74.5,  122.3 : cm^2/V/s
  mob_max    = 1430.0,  480.0 : cm^2/V/s
  N_ref      = 8.6e16, 1.4e17 : 1/cm^3
  v_sat      =    1e10,  1e10 : cm/s
  curr_fact  = 1.0 : um
  incomp_ion = false
  ii_tau     = 1.0, 1.0 : ps
  ii_E_dop0  = 45.5, 44.39 : meV
  ii_g       = 2.0, 4.0
  ii_N_crit  = 2e19, 2e19 : 1/cm^3
  ii_dop_th  = 1e25, 1e25 : 1/cm^3

  srh        = false
  srh_tau_n  = 1e-6  : s
  srh_tau_p  = 1e-6  : s

[grid]
  gtype  = "xy"
  max_dx = 50.0 : nm
  max_dy = 25.0 : nm

[poisson]
  x   = 0.0, 0.2 : um
  y   = 0.0, 1.0 : um
  eps = 11.7     : eps0

[transport]
  x = 0.0, 0.2 : um
  y = 0.0, 1.0 : um

! p-type region (bottom half)
[doping]
  x    = 0.0, 0.2 : um
  y    = 0.0, 0.5 : um
  acon = 3e17     : 1/cm^3

! n-type region (top half)
[doping]
  x    = 0.0, 0.2 : um
  y    = 0.5, 1.0 : um
  dcon = 1e17     : 1/cm^3

! Ohmic contact on p-side at y = 0
[contact]
  name = "DRN"
  type = "ohmic"
  x    = 0.0, 0.2 : um
  y    = 0.0, 0.0 : um

! Ohmic contact on n-side at y = L — this is the "collecting" contact for electrons
[contact]
  name = "SRC"
  type = "ohmic"
  x    = 0.0, 0.2 : um
  y    = 1.0, 1.0 : um

! Line beam along x, swept along y (sees the junction at y = 500 nm).
[beam]
  beam_min  = 0.0 : um
  beam_max  = 1.0 : um
  I_beam    = 1.0 : nA/um
  lamella_t = 200.0 : nm
  beam_dist = "line"
  Y_BEAM      = 0.0, 0.5, 1.0 : um
  N_BEAM      = 11, 11

! Refine around junction for depletion resolution
[refine grid]
  y  = 0.4, 0.5 : um
  dy = 20.0, 2.0 : nm
  e  = 1.0

[refine grid]
  y  = 0.5, 0.6 : um
  dy = 2.0, 20.0 : nm
  e  = 1.0
