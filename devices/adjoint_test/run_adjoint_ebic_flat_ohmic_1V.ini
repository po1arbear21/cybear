! Operando adjoint EBIC on the 2D flat-ohmic pn junction.
! Same geometry / mesh / sweep grid as run_adjoint_ebic_flat_ohmic.ini;
! the only difference is per-contact bias:
!   V_P_CONTACT = 1.0 V (forward bias — crushes depletion, injects minority
!                        carriers, drives large forward dark current).
!   V_N_CONTACT = 0.0 V (reference).
!
! Adjoint linearizes the DC problem around u* = solve(V_P = 1V, V_N = 0V,
! beam off). Forward validation subtracts the dark contact current so the
! compared quantity is the beam-induced delta I, not the raw terminal I.

[nlpe params]
  atol   = 1e-9 : V
  dx_lim = 100.0
  min_it = 1
  max_it = 1000

[dd params]
  log        = true
  atol       = 1e-15 : cm^-3
  rtol       = 1e-10
  dx_lim     = 5e25  : cm^-3
  min_it     = 2
  max_it     = 200
  ndens-xmin = 1e-80 : cm^-3
  pdens-xmin = 1e-80 : cm^-3

[gummel params]
  log    = true
  atol   = 1e-2 : V
  rtol   = 1e-6
  min_it = 1
  max_it = 20

[full newton params]
  log    = true
  atol   = 1e-12 : V
  rtol   = 1e-12
  dx_lim = 0.1 : V
  min_it = 2
  max_it = 400

[adjoint ebic]
  name               = "flat_ohmic_adjoint_1V"
  collecting_contact = "N_CONTACT"

  ! Forward bias on the p-side, n-side grounded.
  V_P_CONTACT = 0.0 : V
  V_N_CONTACT = -2.0 : V

  ! Skip forward-Newton spot-check — at 1V forward the Newton solve is
  ! expensive even with ramping; this run is about the adjoint map, not
  ! sign/prefactor validation (that was already pinned at V=0).
  run_forward_validation = false

  x_beam_min = 0.0  : um
  x_beam_max = 14.0 : um
  x_beam_n   = 281

  y_beam_min = 0.0  : um
  y_beam_max = 8.5  : um
  y_beam_n   = 171
