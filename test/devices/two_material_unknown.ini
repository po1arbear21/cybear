; error-path fixture: [transport] references a material name not present in the catalog.
; expected: program_error "[transport]: unknown material 'Unobtainium'"

[geometry]
  curr_fact = 1.0

[semiconductor]
  name      = "Si"
  electrons = true
  holes     = true
  N_c0      = 2.86e19          : 1/cm^3
  N_v0      = 3.10e19          : 1/cm^3
  E_gap     = 1.12             : eV
  chi       = 4.05             : eV
  dos       = "parabolic"
  dist      = "maxwell"
  tabledir  = "tables/"
  reg       = false
  stab      = "SG"

[semiconductor]
  name      = "SiGe"
  electrons = true
  holes     = true
  N_c0      = 1.0e19           : 1/cm^3
  N_v0      = 5.0e18           : 1/cm^3
  E_gap     = 0.97             : eV
  chi       = 4.10             : eV
  dos       = "parabolic"
  dist      = "maxwell"
  tabledir  = "tables/"
  reg       = false
  stab      = "SG"

[bulk mobility]
  zero_field_model = "constant"
  mob0             = 100, 100 : cm^2/V/s
  saturation_model = "off"

[grid]
  gtype  = "x"
  max_dx = 0.5 : nm

[poisson]
  x   = 0, 100 : nm
  eps = 11.7   : eps0

[transport]
  x        = 0, 50    : nm
  material = "Si"

[transport]
  x        = 50, 100  : nm
  material = "Unobtainium"

[doping]
  x    = 0, 100  : nm
  dcon = 1e16    : 1/cm^3

[contact]
  name = "A"
  type = "gate"
  x    = 0, 0    : nm

[contact]
  name = "B"
  type = "gate"
  x    = 100, 100 : nm
